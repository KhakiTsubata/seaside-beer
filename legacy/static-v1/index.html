<style>
  :root {
    --sb-sky-50:  #EAFAFF;
    --sb-sky-100: #CFF3FF;
    --sb-sky-200: #A3E7FF;
    --sb-sky-300: #6BD8FF;
    --sb-sky-400: #2EC4F1;
    --sb-sky-500: #00AFE0;
    --sb-sky-600: #0090BE;
    --sb-sky-700: #03719A;
    --sb-sky-800: #08547A;
    --sb-sky-900: #0E3B5C;

    --sb-sun-300: #FFEDAD;
    --sb-sun-400: #FFD95C;
    --sb-sun-500: #FFC12E;
    --sb-sun-600: #E89A00;

    --sb-coral:   #FF9071;
    --sb-mint:    #7EE0C6;

    --sb-sand-100: #FFF3D1;
    --sb-sand-200: #FFE4A3;

    --sb-ink:      #0E3B5C;
    --sb-muted:    #5B7E94;
    --sb-line:     #DCF1FB;
    --sb-paper:    #FFFFFF;
    --sb-bg:       #E8F7FE;

    --sb-radius:   18px;
    --sb-radius-lg: 28px;
    --sb-shadow-md: 0 10px 24px -10px rgba(0,144,190,0.22), 0 2px 6px rgba(0,144,190,0.06);
    --sb-shadow-lg: 0 30px 50px -24px rgba(0,144,190,0.28), 0 8px 20px -8px rgba(0,144,190,0.14);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Zen Maru Gothic', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--sb-ink);
    background: var(--sb-paper);
    -webkit-font-smoothing: antialiased;
  }
  body { letter-spacing: 0.01em; }
  button { font-family: inherit; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--sb-sun-400); color: var(--sb-sky-900); }

  /* ─── Header ─── */
  .header {
    position: sticky; top: 0; z-index: 20;
    background: rgba(255,255,255,0.92);
    backdrop-filter: saturate(1.6) blur(10px);
    -webkit-backdrop-filter: saturate(1.6) blur(10px);
    border-bottom: 1px solid var(--sb-line);
  }
  .header-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 40px;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; color: var(--sb-sky-800); cursor: pointer; }
  .logo-mark {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .logo-mark img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; }
  .nav-list { display: flex; align-items: center; gap: 28px; font-size: 14px; font-weight: 500; }
  .nav-list a { color: var(--sb-ink); opacity: 0.8; transition: opacity .2s, color .2s; position: relative; padding: 4px 0; }
  .nav-list a:hover { opacity: 1; color: var(--sb-sky-500); }
  .nav-list a.active { color: var(--sb-sky-500); opacity: 1; }
  .nav-list a.active::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -14px; height: 2px;
    background: var(--sb-sky-500); border-radius: 2px;
  }
  .contact-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px; border-radius: 999px;
    border: 2px solid var(--sb-sky-500); background: transparent;
    font-weight: 700; font-size: 13px; color: var(--sb-sky-700);
    cursor: pointer; transition: all .2s;
  }
  .contact-btn:hover { background: var(--sb-sky-500); color: white; }

  .hamburger {
    width: 44px; height: 44px; border-radius: 10px;
    background: transparent; border: 1px solid var(--sb-line);
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    cursor: pointer; padding: 0;
  }
  .hamburger span { display: block; width: 18px; height: 2px; background: var(--sb-ink); border-radius: 2px; transition: transform .3s, opacity .2s; }
  .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

  .m-menu {
    display: none;
    position: fixed; top: 67px; left: 0; right: 0; bottom: 0;
    background: var(--sb-paper); padding: 24px 20px; z-index: 19;
    flex-direction: column; gap: 4px; overflow-y: auto;
    transform: translateX(100%); transition: transform .32s cubic-bezier(.22,.8,.32,1);
  }
  .m-menu.open { transform: translateX(0); }
  .m-menu a {
    padding: 18px 4px; border-bottom: 1px solid var(--sb-line);
    font-weight: 500; font-size: 16px; display: flex; justify-content: space-between; align-items: center;
  }
  .m-menu a:hover { color: var(--sb-sky-500); }
  .m-menu-contact {
    margin-top: 24px; padding: 16px; text-align: center;
    background: linear-gradient(135deg, #FFE26A, #FFC12E);
    border-radius: 999px; font-weight: 800; color: var(--sb-sky-900);
    border-bottom: none !important;
  }

  /* ─── Hero ─── */
  .hero {
    position: relative;
    background: linear-gradient(180deg, #6BD8FF 0%, #2EC4F1 55%, #00AFE0 100%);
    overflow: hidden;
  }
  .hero-image { display: block; width: 100%; height: auto; user-select: none; -webkit-user-drag: none; }
  .hero-caption { padding: 36px 56px 56px; text-align: center; position: relative; z-index: 3; }
  .hero-inner { position: relative; z-index: 3; max-width: 720px; margin: 0 auto; }
  .hero-kicker {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--sb-sky-800); margin-bottom: 18px;
    background: rgba(107,216,255,0.18); padding: 6px 16px; border-radius: 999px;
  }
  .hero h1 {
    font-size: 38px; line-height: 1.5; font-weight: 800;
    letter-spacing: 0.02em; color: var(--sb-sky-900); margin: 0 0 20px; text-wrap: pretty;
  }
  .hero-lead { font-size: 15px; line-height: 1.95; color: var(--sb-muted); margin: 0 0 28px; font-weight: 500; }
  .hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  /* ─── Buttons ─── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    padding: 14px 24px; border-radius: 14px; font-weight: 800; font-size: 14px;
    cursor: pointer; transition: transform .15s, box-shadow .2s, background .2s;
    border: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, #FFE26A 0%, #FFC12E 100%); color: var(--sb-sky-900);
    box-shadow: 0 4px 0 var(--sb-sun-600), 0 8px 20px -8px rgba(232,154,0,0.5);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--sb-sun-600), 0 12px 24px -8px rgba(232,154,0,0.6); }
  .btn-primary:active { transform: translateY(2px); box-shadow: 0 0 0 var(--sb-sun-600); }
  .btn-ghost {
    background: rgba(255,255,255,0.95); color: var(--sb-sky-800);
    border: 2px solid white;
    box-shadow: 0 4px 16px -4px rgba(0,144,190,0.2);
  }
  .btn-ghost:hover { background: white; transform: translateY(-2px); }

  /* ─── Sections ─── */
  section { padding: 72px 40px; background: var(--sb-paper); position: relative; }
  .section-header { margin-bottom: 48px; text-align: center; }
  .section-kicker {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--sb-sky-600); margin-bottom: 12px;
    padding: 4px 12px; background: var(--sb-sky-50); border-radius: 999px;
  }
  .section-title { font-size: 32px; font-weight: 900; letter-spacing: 0.02em; margin: 0 0 10px; color: var(--sb-ink); }
  .section-title .accent { color: var(--sb-sky-500); }
  .section-sub { font-size: 14px; color: var(--sb-muted); line-height: 1.9; max-width: 640px; margin: 0 auto; }

  /* ─── About ─── */
  .about { background: linear-gradient(180deg, #FFFFFF 0%, #EAFAFF 100%); }
  .about-lead { max-width: 720px; margin: 0 auto; text-align: center; }
  .about-lead p { font-size: 15px; line-height: 2.05; color: var(--sb-muted); margin: 0 0 20px; }

  /* ─── Features ─── */
  #features { background: linear-gradient(180deg, #EAFAFF 0%, #DFF5FE 100%); }
  .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1120px; margin: 0 auto; }
  .feature-card {
    background: var(--sb-paper);
    border: 1px solid var(--sb-line);
    border-radius: var(--sb-radius-lg);
    padding: 32px 26px;
    transition: transform .3s cubic-bezier(.22,.8,.32,1), box-shadow .3s, border-color .3s;
    cursor: default; position: relative; overflow: hidden; text-align: center;
  }
  .feature-card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--sb-sky-300), var(--sb-sky-500));
    opacity: 0; transition: opacity .3s;
  }
  .feature-card:hover::before { opacity: 1; }
  .feature-card:hover { transform: translateY(-6px); box-shadow: var(--sb-shadow-lg); border-color: var(--sb-sky-300); }
  .feature-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--sb-sky-400); letter-spacing: 0.16em; margin-bottom: 14px; }
  .feature-icon-wrap {
    width: 96px; height: 96px; border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px; overflow: hidden;
    animation: bob 6s ease-in-out infinite;
  }
  .feature-icon-img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: inherit; }
  .feature-card:nth-child(2) .feature-icon-wrap { animation-delay: -2s; }
  .feature-card:nth-child(3) .feature-icon-wrap { animation-delay: -4s; }
  @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .feature-title { font-size: 18px; font-weight: 800; margin: 0 0 10px; color: var(--sb-ink); }
  .feature-desc { font-size: 13px; line-height: 1.9; color: var(--sb-muted); margin: 0; }

  /* ─── News + Blog ─── */
  .split-section { background: linear-gradient(180deg, #DFF5FE 0%, #C7EFFC 100%); }
  .split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1120px; margin: 0 auto; }
  .panel {
    background: var(--sb-paper); border: 1px solid var(--sb-line);
    border-radius: var(--sb-radius-lg); padding: 28px 26px;
    box-shadow: var(--sb-shadow-md);
  }
  .panel-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--sb-line);
  }
  .panel-title { font-size: 18px; font-weight: 800; margin: 0; }
  .panel-title small {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500;
    color: var(--sb-sky-500); letter-spacing: 0.16em; margin-left: 10px;
  }
  .news-item {
    display: grid; grid-template-columns: 90px 64px 1fr;
    gap: 14px; align-items: center;
    padding: 14px 4px; border-bottom: 1px dashed var(--sb-line);
    font-size: 13px; cursor: pointer; transition: color .2s;
  }
  .news-item:hover { color: var(--sb-sky-500); }
  .news-item:last-child { border-bottom: none; }
  .news-date { font-family: 'JetBrains Mono', monospace; color: var(--sb-muted); font-size: 12px; }
  .news-tag {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; letter-spacing: 0.1em;
  }
  .news-tag.info   { background: var(--sb-sky-100); color: var(--sb-sky-700); }
  .news-tag.event  { background: #FFEDAD; color: #8C6104; }
  .news-tag.case   { background: #D7F4E4; color: #2E7D4A; }
  .blog-item {
    display: grid; grid-template-columns: 92px 1fr; gap: 14px;
    padding: 14px 4px; border-bottom: 1px dashed var(--sb-line);
    align-items: center; cursor: pointer; transition: opacity .2s;
  }
  .blog-item:hover { opacity: 0.7; }
  .blog-item:last-child { border-bottom: none; }
  .blog-thumb {
    width: 92px; height: 62px; border-radius: 12px;
    background: linear-gradient(135deg, var(--sb-sky-200), var(--sb-sky-300));
    border: 1px solid var(--sb-sky-200);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.8);
    overflow: hidden;
  }
  .blog-body { font-size: 13px; }
  .blog-tag { display: inline-block; font-size: 10px; font-weight: 800; color: var(--sb-sky-600); letter-spacing: 0.12em; margin-bottom: 4px; }
  .blog-title { line-height: 1.6; margin: 0 0 4px; font-weight: 500; }
  .blog-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--sb-muted); }
  .panel-foot { margin-top: 14px; text-align: right; }
  .panel-foot a {
    font-size: 12px; color: var(--sb-sky-600); font-weight: 700;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 999px; border: 1px solid var(--sb-sky-200);
    transition: all .2s;
  }
  .panel-foot a:hover { background: var(--sb-sky-50); border-color: var(--sb-sky-400); }

  /* ─── CTA Band ─── */
  .cta-band {
    background: linear-gradient(135deg, #2EC4F1 0%, #0090BE 60%, #08547A 100%);
    color: white; position: relative; overflow: hidden; padding: 72px 40px;
  }
  .cta-band::after {
    content: ""; position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,255,255,0.25) 0, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(126,224,198,0.3) 0, transparent 40%);
    pointer-events: none;
  }
  .cta-inner {
    position: relative; z-index: 2;
    display: grid; grid-template-columns: 1.2fr 1fr; gap: 48px; align-items: center;
    max-width: 1040px; margin: 0 auto;
  }
  .cta-band h2 { font-size: 32px; margin: 0 0 16px; font-weight: 900; line-height: 1.5; letter-spacing: 0.02em; }
  .cta-band p { font-size: 15px; line-height: 1.9; margin: 0; opacity: 0.92; }
  .cta-form {
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.22);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-radius: var(--sb-radius-lg); padding: 24px;
    position: relative; z-index: 3;
  }
  .cta-form label {
    display: block; font-size: 11px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 6px; opacity: 0.85;
  }
  .cta-form input, .cta-form textarea {
    width: 100%; padding: 12px 14px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1);
    color: white; font-family: inherit; font-size: 14px;
    margin-bottom: 14px; transition: border-color .2s, background .2s;
  }
  .cta-form input::placeholder, .cta-form textarea::placeholder { color: rgba(255,255,255,0.55); }
  .cta-form input:focus, .cta-form textarea:focus {
    outline: none; border-color: var(--sb-sun-400); background: rgba(255,255,255,0.18);
  }
  .cta-form textarea { resize: none; height: 80px; }
  .cta-form input.error, .cta-form textarea.error { border-color: #FF9071; background: rgba(255,143,122,0.12); }
  .cta-error { font-size: 11px; color: #FFD4C9; margin-top: -10px; margin-bottom: 10px; }
  .cta-submit {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #FFE26A, #FFC12E);
    color: var(--sb-sky-900); border: none; border-radius: 12px;
    font-weight: 800; cursor: pointer; transition: transform .15s; font-size: 14px;
    box-shadow: 0 4px 0 var(--sb-sun-600); font-family: inherit;
  }
  .cta-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--sb-sun-600); }
  .cta-success {
    padding: 20px; background: rgba(255,214,102,0.2); border: 1px solid var(--sb-sun-400);
    border-radius: 12px; font-size: 14px; text-align: center; line-height: 1.8;
  }

  /* ─── Wave Divider ─── */
  .wave-divider { height: 48px; background: #0E3B5C; position: relative; }
  .wave-divider svg { position: absolute; top: -1px; left: 0; right: 0; width: 100%; height: 48px; }

  /* ─── Footer ─── */
  .footer {
    background: linear-gradient(180deg, #0E3B5C 0%, #08253C 100%);
    color: #A9C7DA; padding: 64px 40px 32px; position: relative; overflow: hidden;
  }
  .footer-top {
    display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 40px;
    padding-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.08);
    max-width: 1120px; margin: 0 auto;
  }
  .footer-brand { color: white; font-weight: 800; font-size: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
  .footer-tagline { font-size: 13px; line-height: 1.85; color: #85A3BB; }
  .footer-col h4 { font-size: 12px; color: white; margin: 0 0 14px; letter-spacing: 0.14em; font-family: 'JetBrains Mono', monospace; font-weight: 500; }
  .footer-col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
  .footer-col a { font-size: 13px; color: #A9C7DA; transition: color .2s; }
  .footer-col a:hover { color: var(--sb-sun-400); }
  .footer-bottom {
    padding-top: 24px; display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: #6F8CA5; font-family: 'JetBrains Mono', monospace;
    max-width: 1120px; margin: 0 auto;
  }

  /* ─── Reveal animation ─── */
  .reveal { opacity: 0; transform: translateY(16px); transition: opacity .7s ease, transform .7s cubic-bezier(.22,.8,.32,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }

  /* ─── Toast ─── */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: var(--sb-ink); color: white; padding: 12px 22px; border-radius: 999px;
    font-size: 13px; box-shadow: var(--sb-shadow-lg); z-index: 100;
    animation: toast-in .3s ease; font-weight: 600; white-space: nowrap;
  }
  @keyframes toast-in { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }

  /* ─── Bubble decoration ─── */
  .deco-bubble {
    position: absolute; pointer-events: none;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(163,231,255,0.3));
    animation: rise 10s ease-in infinite; opacity: 0;
  }
  @keyframes rise {
    0%   { transform: translateY(0) scale(0.6); opacity: 0; }
    20%  { opacity: 0.9; }
    100% { transform: translateY(-140px) scale(1); opacity: 0; }
  }

  /* ─── Responsive ─── */
  @media (max-width: 1024px) {
    .header-inner { padding: 14px 24px; }
    .features-grid { grid-template-columns: repeat(2, 1fr); }
    .cta-inner { grid-template-columns: 1fr; gap: 32px; }
    .footer-top { grid-template-columns: 1fr 1fr; gap: 28px; }
  }
  @media (max-width: 768px) {
    .header-inner { padding: 14px 20px; }
    .nav-list, .contact-btn { display: none; }
    .hamburger { display: flex; }
    .m-menu { display: flex; }
    .hero-caption { padding: 24px 20px 32px; }
    .hero h1 { font-size: 24px; line-height: 1.5; }
    .hero-lead { font-size: 13px; line-height: 1.85; margin-bottom: 20px; }
    .hero-ctas { flex-direction: column; gap: 10px; align-items: stretch; }
    section { padding: 48px 20px; }
    .section-header { margin-bottom: 28px; }
    .section-title { font-size: 24px; }
    .features-grid { grid-template-columns: 1fr; gap: 14px; }
    .split-grid { grid-template-columns: 1fr; gap: 20px; }
    .cta-band { padding: 48px 20px; }
    .cta-band h2 { font-size: 22px; }
    .footer { padding: 40px 20px 24px; }
    .footer-top { grid-template-columns: 1fr 1fr; gap: 20px; }
    .footer-bottom { flex-direction: column; gap: 10px; text-align: center; }
    .news-item { grid-template-columns: 80px 52px 1fr; gap: 10px; }
  }
  @media (max-width: 480px) {
    .footer-top { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="data/news.js"></script>
<script src="data/posts.js"></script>

<script type="text/babel">
// ─── Icons ───────────────────────────────────────────────
const SBIcons = {
  Logo: () => (
    <img src="assets/logo-icon.png" alt="Seaside Beer logo" style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
  ),
  Mail: ({ size = 16 }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="3" y="5" width="18" height="14" rx="2" />
      <path d="M3 7l9 6 9-6" />
    </svg>
  ),
  Arrow: ({ size = 14 }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M5 12h14M13 5l7 7-7 7" />
    </svg>
  ),
  ArrowSmall: ({ size = 12 }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M5 12h14M13 5l7 7-7 7" />
    </svg>
  ),
};

// ─── App ─────────────────────────────────────────────────
function App() {
  const [menuOpen, setMenuOpen] = React.useState(false);
  const [activeNav, setActiveNav] = React.useState('home');
  const [form, setForm] = React.useState({ name: '', email: '', msg: '' });
  const [errors, setErrors] = React.useState({});
  const [submitted, setSubmitted] = React.useState(false);
  const [toast, setToast] = React.useState(null);
  const [news, setNews] = React.useState([]);
  const [posts, setPosts] = React.useState([]);

  // データ読み込み（localStorageがあれば優先、なければJSファイルのデータを使用）
  React.useEffect(() => {
    const loadData = (key, windowKey, setter) => {
      const local = localStorage.getItem(key);
      if (local) { try { setter(JSON.parse(local)); return; } catch (e) {} }
      if (window[windowKey]) setter(window[windowKey]);
    };
    loadData('sb-news', 'SB_NEWS', setNews);
    loadData('sb-posts', 'SB_POSTS', setPosts);
  }, []);

  const showToast = (msg) => {
    setToast(msg);
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => setToast(null), 2400);
  };

  // Reveal on scroll
  React.useEffect(() => {
    const observer = new IntersectionObserver(
      (entries) => entries.forEach((e) => { if (e.isIntersecting) e.target.classList.add('in'); }),
      { threshold: 0.12 }
    );
    document.querySelectorAll('.reveal').forEach((n) => observer.observe(n));
    return () => observer.disconnect();
  }, []);

  // Close menu on resize
  React.useEffect(() => {
    const onResize = () => { if (window.innerWidth > 768) setMenuOpen(false); };
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const smoothScroll = (id) => {
    const el = document.getElementById(id);
    if (el) {
      const top = el.getBoundingClientRect().top + window.scrollY - 70;
      window.scrollTo({ top, behavior: 'smooth' });
    }
  };

  const navItems = [
    { id: 'home',     label: 'ホーム' },
    { id: 'about',    label: 'Seaside Beerとは' },
    { id: 'features', label: 'サービス' },
    { id: 'news',     label: 'お知らせ' },
    { id: 'blog',     label: 'ブログ' },
  ];

  const handleNavClick = (id, e) => {
    if (e) e.preventDefault();
    setActiveNav(id);
    setMenuOpen(false);
    if (id === 'home') window.scrollTo({ top: 0, behavior: 'smooth' });
    else smoothScroll(id);
  };

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'お名前を入力してください';
    if (!form.email.trim()) e.email = 'メールアドレスを入力してください';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'メールアドレスの形式が正しくありません';
    if (!form.msg.trim()) e.msg = 'お問い合わせ内容を入力してください';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const CONTACT_EMAIL = 'seasidebeer.setouchi@gmail.com';
  // ▼ Web3Forms のアクセスキー（無料取得: https://web3forms.com → メアド入力するだけ）
  const WEB3FORMS_KEY = 'REDACTED_WEB3FORMS_ACCESS_KEY';

  const handleSubmit = async (ev) => {
    ev.preventDefault();
    if (!validate()) { showToast('入力内容を確認してください'); return; }

    // Web3Forms 経由で CONTACT_EMAIL に送信
    if (WEB3FORMS_KEY !== 'YOUR_ACCESS_KEY_HERE') {
      try {
        const res = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
          body: JSON.stringify({
            access_key: WEB3FORMS_KEY,
            subject: `【Seaside Beer】お問い合わせ：${form.name}様`,
            from_name: form.name,
            email: form.email,
            message: form.msg,
          }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message);
      } catch (err) {
        showToast('送信に失敗しました。直接メールにてご連絡ください。');
        return;
      }
    }

    setSubmitted(true);
    showToast('送信しました！折り返しご連絡します。');
  };

  return (
    <>
      {/* ── Header ── */}
      <header className="header">
        <div className="header-inner">
          <div className="logo" onClick={() => handleNavClick('home', null)}>
            <span className="logo-mark"><SBIcons.Logo /></span>
            <span>Seaside Beer</span>
          </div>

          <nav className="nav-list">
            {navItems.map((n) => (
              <a
                key={n.id}
                href={'#' + n.id}
                className={activeNav === n.id ? 'active' : ''}
                onClick={(e) => handleNavClick(n.id, e)}
              >{n.label}</a>
            ))}
          </nav>

          <button className="contact-btn" onClick={() => smoothScroll('contact')}>
            <SBIcons.Mail size={14} />
            お問い合わせ
          </button>

          <button
            className={'hamburger ' + (menuOpen ? 'open' : '')}
            onClick={() => setMenuOpen(!menuOpen)}
            aria-label="メニュー"
          >
            <span></span><span></span><span></span>
          </button>
        </div>

        <nav className={'m-menu ' + (menuOpen ? 'open' : '')}>
          {navItems.map((n) => (
            <a key={n.id} href={'#' + n.id} onClick={(e) => handleNavClick(n.id, e)}>
              {n.label}
              <SBIcons.ArrowSmall size={12} />
            </a>
          ))}
          <a className="m-menu-contact" href="#contact" onClick={(e) => { e.preventDefault(); setMenuOpen(false); smoothScroll('contact'); }}>
            お問い合わせ
          </a>
        </nav>
      </header>

      {/* ── Hero ── */}
      <div id="home" className="hero">
        <picture>
          <source media="(max-width: 768px)" srcSet="assets/hero-seaside-mobile.png" />
          <img
            className="hero-image"
            src="assets/hero-seaside-full.png"
            alt="Seaside Beer — AIに仕事を任せて、海辺でビールでも飲もう。生成AIスクール・法人向け支援・瀬戸内・愛媛"
          />
        </picture>
        <div className="hero-caption reveal in">
          <div className="hero-inner">
            <p className="hero-lead" style={{ color: 'rgb(0,61,95)' }}>
              Seaside Beerは、瀬戸内・愛媛を拠点に<br />
              生成AI技術のスクールと法人向け支援を行う組織です。
            </p>
            <div className="hero-ctas">
              <button className="btn btn-primary" onClick={() => smoothScroll('features')}>
                サービスを見る <SBIcons.Arrow />
              </button>
              <button className="btn btn-ghost" onClick={() => smoothScroll('contact')}>
                お問い合わせ <SBIcons.Arrow />
              </button>
            </div>
          </div>
        </div>
      </div>

      {/* ── About ── */}
      <section id="about" className="about">
        <div className="section-header reveal">
          <div className="section-kicker">ABOUT</div>
          <h2 className="section-title">Seaside Beer<span className="accent">とは</span></h2>
        </div>
        <div className="about-lead reveal">
          <p>
            AIに仕事を任せることで、もっと自由に、もっと創造的に。<br />
            私たちは生成AIを通じて、瀬戸内・愛媛の個人や企業が、<br />
            新しい未来をつくるお手伝いをします。
          </p>
          <button className="btn btn-ghost" style={{ fontSize: 12, padding: '10px 18px' }}>
            詳しく見る <SBIcons.ArrowSmall />
          </button>
        </div>
      </section>

      {/* ── Features ── */}
      <section id="features">
        <div className="section-header reveal">
          <div className="section-kicker">WHAT WE DO</div>
          <h2 className="section-title">3つの<span className="accent">サービス</span></h2>
          <p className="section-sub">初心者から企業の実務担当まで、AIを活用したいすべての人へ。</p>
        </div>
        <div className="features-grid">
          {[
            { num: '01', img: 'assets/feature-school.png',   alt: '生成AIスクール', title: '生成AIスクール',  desc: '初心者から実務者まで、実践的に学べるカリキュラムを提供します。ChatGPT・Claude・画像生成の使い方を基礎から。' },
            { num: '02', img: 'assets/feature-business.png', alt: '法人向け支援',   title: '法人向け支援',   desc: '業務効率化や新規事業開発など、企業のAI活用を伴走支援します。導入設計からPoC、運用まで一気通貫で。' },
            { num: '03', img: 'assets/feature-local.png',    alt: '瀬戸内・愛媛から', title: '瀬戸内・愛媛から', desc: '地域に根ざし、瀬戸内から全国へAIの可能性を広げていきます。地方だからこそ生まれる新しい働き方を。' },
          ].map((f) => (
            <div key={f.num} className="feature-card reveal">
              <div className="feature-num">{f.num} / 03</div>
              <div className="feature-icon-wrap">
                <img src={f.img} alt={f.alt} className="feature-icon-img" />
              </div>
              <h3 className="feature-title">{f.title}</h3>
              <p className="feature-desc">{f.desc}</p>
            </div>
          ))}
        </div>
      </section>

      {/* ── News + Blog ── */}
      <section id="news" className="split-section">
        <div className="split-grid">
          <div className="panel reveal">
            <div className="panel-head">
              <h3 className="panel-title">お知らせ<small>NEWS</small></h3>
            </div>
            {news.slice(0, 4).map((n, i) => (
              <div key={n.id || i} className="news-item">
                <span className="news-date">{n.date}</span>
                <span className={'news-tag ' + n.tag}>{n.tagLabel}</span>
                <span>{n.text}</span>
              </div>
            ))}
            <div className="panel-foot">
              <a href="#" onClick={(e) => e.preventDefault()}>一覧を見る <SBIcons.ArrowSmall /></a>
            </div>
          </div>

          <div id="blog" className="panel reveal">
            <div className="panel-head">
              <h3 className="panel-title">ブログ<small>BLOG</small></h3>
            </div>
            {posts.slice(0, 4).map((b, i) => (
              <a key={b.slug || i} href={'post.html?slug=' + encodeURIComponent(b.slug)} className="blog-item" style={{ color: 'inherit' }}>
                <div className="blog-thumb" style={b.thumbnail ? { backgroundImage: `url(${b.thumbnail})`, backgroundSize: 'cover', backgroundPosition: 'center' } : {}}>
                  {!b.thumbnail && 'IMG'}
                </div>
                <div className="blog-body">
                  <div className="blog-tag">{b.label}</div>
                  <p className="blog-title">{b.title}</p>
                  <div className="blog-date">{b.date}</div>
                </div>
              </a>
            ))}
            <div className="panel-foot">
              <a href="#" onClick={(e) => e.preventDefault()}>一覧を見る <SBIcons.ArrowSmall /></a>
            </div>
          </div>
        </div>
      </section>

      {/* ── Contact CTA ── */}
      <section id="contact" className="cta-band">
        <div className="cta-inner">
          <div className="reveal">
            <div className="section-kicker" style={{ color: 'rgba(255,255,255,0.7)', background: 'rgba(255,255,255,0.15)' }}>CONTACT</div>
            <h2>まずは気軽に<br />ご相談ください。</h2>
            <p>
              AIで何ができる？導入は難しい？<br />
              そんな疑問に、海辺からお答えします。
            </p>
            <p style={{ marginTop: 20, fontSize: 13, opacity: 0.75 }}>
              またはメールで直接ご連絡ください：<br />
              <a href={`mailto:${CONTACT_EMAIL}`} style={{ color: '#FFE26A', fontWeight: 700, letterSpacing: '0.03em' }}>
                {CONTACT_EMAIL}
              </a>
            </p>
          </div>

          {submitted ? (
            <div className="cta-form reveal">
              <div className="cta-success">
                ✓ ありがとうございます。<br />
                折り返しご連絡いたします。
              </div>
            </div>
          ) : (
            <form className="cta-form reveal" onSubmit={handleSubmit} noValidate>
              <label>お名前</label>
              <input
                type="text"
                className={errors.name ? 'error' : ''}
                placeholder="山田 太郎"
                value={form.name}
                onChange={(e) => setForm({ ...form, name: e.target.value })}
              />
              {errors.name && <div className="cta-error">{errors.name}</div>}

              <label>メールアドレス</label>
              <input
                type="email"
                className={errors.email ? 'error' : ''}
                placeholder="you@example.com"
                value={form.email}
                onChange={(e) => setForm({ ...form, email: e.target.value })}
              />
              {errors.email && <div className="cta-error">{errors.email}</div>}

              <label>お問い合わせ内容</label>
              <textarea
                className={errors.msg ? 'error' : ''}
                placeholder="AI導入について相談したい…"
                value={form.msg}
                onChange={(e) => setForm({ ...form, msg: e.target.value })}
              />
              {errors.msg && <div className="cta-error">{errors.msg}</div>}

              <button type="submit" className="cta-submit">送信する</button>
            </form>
          )}
        </div>
      </section>

      {/* ── Wave Divider ── */}
      <div className="wave-divider">
        <svg viewBox="0 0 1200 48" preserveAspectRatio="none">
          <path d="M0 30 Q100 0,200 24 T400 24 T600 24 T800 24 T1000 24 T1200 24 L1200 0 L0 0 Z" fill="white" opacity="0.15" />
          <path d="M0 36 Q100 14,200 32 T400 32 T600 32 T800 32 T1000 32 T1200 32 L1200 0 L0 0 Z" fill="white" />
        </svg>
      </div>

      {/* ── Footer ── */}
      <footer className="footer">
        <div className="footer-top">
          <div>
            <div className="footer-brand">
              <span className="logo-mark" style={{ background: 'rgba(255,255,255,0.1)' }}>
                <SBIcons.Logo />
              </span>
              Seaside Beer
            </div>
            <p className="footer-tagline">
              瀬戸内・愛媛を拠点に、<br />
              生成AIで新しい働き方を提案します。
            </p>
          </div>
          <div className="footer-col">
            <h4>SITEMAP</h4>
            <ul>
              <li><a href="#" onClick={(e) => { e.preventDefault(); handleNavClick('home', null); }}>ホーム</a></li>
              <li><a href="#about" onClick={(e) => handleNavClick('about', e)}>Seaside Beerとは</a></li>
              <li><a href="#features" onClick={(e) => handleNavClick('features', e)}>サービス</a></li>
              <li><a href="#news" onClick={(e) => handleNavClick('news', e)}>お知らせ</a></li>
            </ul>
          </div>
          <div className="footer-col">
            <h4>RESOURCES</h4>
            <ul>
              <li><a href="#blog" onClick={(e) => handleNavClick('blog', e)}>ブログ</a></li>
              <li><a href="#">セミナー情報</a></li>
              <li><a href="#">資料ダウンロード</a></li>
            </ul>
          </div>
          <div className="footer-col">
            <h4>CONTACT</h4>
            <ul>
              <li><a href="#contact" onClick={(e) => { e.preventDefault(); smoothScroll('contact'); }}>お問い合わせフォーム</a></li>
              <li><a href={`mailto:${CONTACT_EMAIL}`} style={{ wordBreak: 'break-all' }}>{CONTACT_EMAIL}</a></li>
              <li><a href="#">採用情報</a></li>
              <li><a href="privacy.html">プライバシーポリシー</a></li>
            </ul>
          </div>
        </div>
        <div className="footer-bottom">
          <span>© 2026 SEASIDE BEER, EHIME</span>
          <span>MADE WITH ☀ + 🍺</span>
        </div>
      </footer>

      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
