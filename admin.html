<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>管理画面 — Seaside Beer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --sky-50:#EAFAFF;--sky-100:#CFF3FF;--sky-200:#A3E7FF;--sky-300:#6BD8FF;
    --sky-400:#2EC4F1;--sky-500:#00AFE0;--sky-600:#0090BE;--sky-700:#03719A;
    --sky-800:#08547A;--sky-900:#0E3B5C;--sun-400:#FFD95C;--sun-500:#FFC12E;
    --ink:#0E3B5C;--muted:#5B7E94;--line:#DCF1FB;--paper:#FFFFFF;--bg:#F4FBFE;
    --danger:#E04848;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:'Zen Maru Gothic',sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}

  .topbar{background:var(--paper);border-bottom:1px solid var(--line);padding:14px 24px;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .topbar-brand{display:flex;align-items:center;gap:10px;font-weight:800;color:var(--sky-800)}
  .topbar-brand .logo-mark{width:32px;height:32px;border-radius:8px;overflow:hidden}
  .topbar-brand .logo-mark img{width:100%;height:100%;object-fit:cover}
  .topbar-brand small{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.16em;color:var(--muted);background:var(--sky-50);padding:3px 8px;border-radius:6px;margin-left:8px}
  .topbar-actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:inherit;background:white;color:var(--ink)}
  .btn:hover{transform:translateY(-1px)}
  .btn-primary{background:var(--sky-500);color:white}
  .btn-primary:hover{background:var(--sky-600)}
  .btn-ghost{background:transparent;border-color:var(--line);color:var(--sky-700)}
  .btn-ghost:hover{background:var(--sky-50);border-color:var(--sky-300)}
  .btn-warning{background:var(--sun-500);color:var(--sky-900)}
  .btn-danger{background:transparent;color:var(--danger);border-color:#FCD9D9}
  .btn-danger:hover{background:#FFF0F0}
  .btn-sm{padding:6px 12px;font-size:12px}

  .container{max-width:1200px;margin:0 auto;padding:24px}
  .tabs{display:flex;gap:4px;margin-bottom:20px;background:white;padding:6px;border-radius:14px;border:1px solid var(--line);width:fit-content}
  .tab{padding:10px 20px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;background:transparent;border:none;color:var(--muted);font-family:inherit}
  .tab.active{background:var(--sky-500);color:white}

  .layout{display:grid;grid-template-columns:1.2fr 1fr;gap:24px}
  @media (max-width:960px){.layout{grid-template-columns:1fr}}

  .card{background:white;border:1px solid var(--line);border-radius:16px;padding:24px}
  .card h2{font-size:16px;font-weight:800;margin:0 0 16px;color:var(--sky-800);display:flex;align-items:center;justify-content:space-between}
  .card h2 small{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--muted);letter-spacing:0.1em}

  .entry{display:flex;align-items:flex-start;gap:12px;padding:12px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;transition:all .15s}
  .entry:hover{border-color:var(--sky-300);background:var(--sky-50)}
  .entry.selected{border-color:var(--sky-500);background:var(--sky-50);box-shadow:0 0 0 3px rgba(0,175,224,0.1)}
  .entry-main{flex:1;min-width:0}
  .entry-meta{display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap}
  .entry-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
  .entry-tag{display:inline-flex;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:800;letter-spacing:0.08em}
  .tag-info{background:var(--sky-100);color:var(--sky-700)}
  .tag-event{background:#FFEDAD;color:#8C6104}
  .tag-case{background:#D7F4E4;color:#2E7D4A}
  .entry-text{font-size:14px;line-height:1.5;color:var(--ink);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .entry-actions{display:flex;gap:4px;flex-shrink:0}

  .form-group{margin-bottom:14px}
  .form-group label{display:block;font-size:11px;font-family:'JetBrains Mono',monospace;letter-spacing:0.14em;text-transform:uppercase;color:var(--sky-700);margin-bottom:6px;font-weight:700}
  .form-group label .req{color:var(--danger);margin-left:4px}
  .form-group input, .form-group select, .form-group textarea {
    width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:white;
    color:var(--ink);font-family:inherit;font-size:14px;transition:border-color .15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus{outline:none;border-color:var(--sky-400);box-shadow:0 0 0 3px rgba(0,175,224,0.1)}
  .form-group textarea{resize:vertical;min-height:120px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7}
  .form-group .hint{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5}

  .form-actions{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}

  .empty-list{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:white;padding:12px 22px;border-radius:999px;font-size:13px;box-shadow:0 10px 30px -10px rgba(0,0,0,0.3);z-index:100;font-weight:600;white-space:nowrap}
  .toast.error{background:var(--danger)}

  .help-banner{background:linear-gradient(135deg,#FFF8E1,#FFE4A3);border:1px solid var(--sun-400);border-radius:14px;padding:16px 20px;margin-bottom:20px;font-size:13px;line-height:1.8;color:#6B4F00}
  .help-banner strong{color:#3D2D00}
  .help-banner code{background:rgba(255,255,255,0.6);padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px}

  .empty-form{padding:60px 20px;text-align:center;color:var(--muted)}
  .empty-form-icon{font-size:32px;margin-bottom:8px}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="data/news.js"></script>
<script src="data/posts.js"></script>

<script type="text/babel">
const TAG_OPTIONS = [
  { value: 'info', label: '情報' },
  { value: 'event', label: 'セミナー' },
  { value: 'case', label: '実績' },
];
const LABEL_OPTIONS = ['活用術', '学び', '事例', 'コラム', 'お知らせ', '技術'];
const THUMB_OPTIONS = [
  { value: '', label: '(なし)' },
  { value: 'assets/hero-seaside.png', label: '海辺イラスト' },
  { value: 'assets/feature-school.png', label: 'スクールアイコン' },
  { value: 'assets/feature-business.png', label: '法人支援アイコン' },
  { value: 'assets/feature-local.png', label: '瀬戸内アイコン' },
];

function todayJP() {
  const d = new Date();
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
}
function newId() { return 'n-' + Date.now().toString(36); }
function slugify(text) {
  return text.toLowerCase().trim()
    .replace(/[^\w\sぁ-んァ-ンー一-龯-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .slice(0, 60) || 'post-' + Date.now().toString(36);
}
function download(filename, data, type = 'application/json') {
  const content = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function App() {
  const [tab, setTab] = React.useState('news');
  const [news, setNews] = React.useState([]);
  const [posts, setPosts] = React.useState([]);
  const [editingNewsId, setEditingNewsId] = React.useState(null);
  const [editingPostSlug, setEditingPostSlug] = React.useState(null);
  const [toast, setToast] = React.useState(null);
  const [toastErr, setToastErr] = React.useState(false);

  // 初期読み込み
  React.useEffect(() => {
    const load = (key, windowKey, setter) => {
      const local = localStorage.getItem(key);
      if (local) { try { setter(JSON.parse(local)); return; } catch(e){} }
      setter(window[windowKey] || []);
    };
    load('sb-news', 'SB_NEWS', setNews);
    load('sb-posts', 'SB_POSTS', setPosts);
  }, []);

  const saveNews = (list) => { setNews(list); localStorage.setItem('sb-news', JSON.stringify(list)); };
  const savePosts = (list) => { setPosts(list); localStorage.setItem('sb-posts', JSON.stringify(list)); };

  const showToast = (msg, err = false) => {
    setToast(msg); setToastErr(err);
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => setToast(null), 2400);
  };

  // ─── News operations ───
  const newNewsEntry = () => ({ id: newId(), date: todayJP(), tag: 'info', tagLabel: '情報', text: '' });
  const editingNews = editingNewsId === 'new' ? newNewsEntry() : (news.find(n => n.id === editingNewsId) || null);

  const saveNewsEntry = (entry) => {
    if (!entry.text.trim()) { showToast('本文を入力してください', true); return; }
    const tagLabel = TAG_OPTIONS.find(t => t.value === entry.tag)?.label || entry.tagLabel;
    const finalEntry = { ...entry, tagLabel };
    let list;
    if (editingNewsId === 'new') {
      list = [finalEntry, ...news];
    } else {
      list = news.map(n => n.id === entry.id ? finalEntry : n);
    }
    list.sort((a,b) => (b.date || '').localeCompare(a.date || ''));
    saveNews(list);
    setEditingNewsId(null);
    showToast('保存しました');
  };
  const deleteNewsEntry = (id) => {
    if (!confirm('このお知らせを削除しますか？')) return;
    saveNews(news.filter(n => n.id !== id));
    if (editingNewsId === id) setEditingNewsId(null);
    showToast('削除しました');
  };

  // ─── Post operations ───
  const newPostEntry = () => ({
    slug: '', title: '', label: '活用術', date: todayJP(),
    excerpt: '', body: '', thumbnail: ''
  });
  const editingPost = editingPostSlug === 'new' ? newPostEntry() : (posts.find(p => p.slug === editingPostSlug) || null);

  const savePostEntry = (entry) => {
    if (!entry.title.trim()) { showToast('タイトルを入力してください', true); return; }
    if (!entry.body.trim()) { showToast('本文を入力してください', true); return; }
    let finalEntry = { ...entry };
    if (!finalEntry.slug) finalEntry.slug = slugify(finalEntry.title);
    let list;
    if (editingPostSlug === 'new') {
      if (posts.some(p => p.slug === finalEntry.slug)) {
        finalEntry.slug = finalEntry.slug + '-' + Date.now().toString(36).slice(-4);
      }
      list = [finalEntry, ...posts];
    } else {
      list = posts.map(p => p.slug === editingPostSlug ? finalEntry : p);
    }
    list.sort((a,b) => (b.date || '').localeCompare(a.date || ''));
    savePosts(list);
    setEditingPostSlug(null);
    showToast('保存しました');
  };
  const deletePost = (slug) => {
    if (!confirm('この記事を削除しますか？')) return;
    savePosts(posts.filter(p => p.slug !== slug));
    if (editingPostSlug === slug) setEditingPostSlug(null);
    showToast('削除しました');
  };

  // ─── Export / Import / Reset ───
  const exportAll = () => {
    const toJs = (varName, data) =>
      `window.${varName} = ${JSON.stringify(data, null, 2)};\n`;
    download('news.js', toJs('SB_NEWS', news), 'text/javascript');
    setTimeout(() => download('posts.js', toJs('SB_POSTS', posts), 'text/javascript'), 300);
    showToast('JSファイルをダウンロードしました');
  };
  const importJson = async (type) => {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.js,.json';
    input.onchange = async (e) => {
      const file = e.target.files[0]; if (!file) return;
      try {
        const text = await file.text();
        // JS形式（window.SB_XX = [...]）またはJSON形式に対応
        let data;
        if (text.trim().startsWith('window.')) {
          const match = text.match(/=\s*(\[[\s\S]*\])/);
          if (!match) throw new Error('形式が正しくありません');
          data = JSON.parse(match[1]);
        } else {
          data = JSON.parse(text);
        }
        if (!Array.isArray(data)) throw new Error('配列形式が必要です');
        if (type === 'news') saveNews(data); else savePosts(data);
        showToast('インポートしました');
      } catch (err) {
        showToast('読み込みに失敗: ' + err.message, true);
      }
    };
    input.click();
  };
  const resetToFile = (type) => {
    if (!confirm('ファイルから再読み込みします。未保存の変更は失われます。よろしいですか？')) return;
    const data = type === 'news' ? window.SB_NEWS : window.SB_POSTS;
    if (!data) { showToast('ファイルデータが見つかりません', true); return; }
    if (type === 'news') { localStorage.removeItem('sb-news'); setNews([...data]); }
    else { localStorage.removeItem('sb-posts'); setPosts([...data]); }
    showToast('リセットしました');
  };

  return (
    <>
      <div className="topbar">
        <div className="topbar-brand">
          <span className="logo-mark"><img src="assets/logo-icon.png" alt="logo" /></span>
          <span>Seaside Beer</span>
          <small>ADMIN</small>
        </div>
        <div className="topbar-actions">
          <a href="index.html" target="_blank" className="btn btn-ghost">サイトを開く ↗</a>
          <button className="btn btn-warning" onClick={exportAll}>📥 JSファイルをダウンロード</button>
        </div>
      </div>

      <div className="container">
        <div className="help-banner">
          <strong>💡 使い方</strong>：ここで追加・編集した内容はブラウザに保存され、サイトのプレビューにも反映されます。
          本番公開する時は <strong>「JSファイルをダウンロード」</strong> を押して、ダウンロードされた <code>news.js</code> と <code>posts.js</code> を <code>data/</code> フォルダに置き換えてください。
        </div>

        <div className="tabs">
          <button className={'tab ' + (tab === 'news' ? 'active' : '')} onClick={() => setTab('news')}>お知らせ ({news.length})</button>
          <button className={'tab ' + (tab === 'posts' ? 'active' : '')} onClick={() => setTab('posts')}>ブログ ({posts.length})</button>
        </div>

        {tab === 'news' && (
          <div className="layout">
            <div className="card">
              <h2>
                お知らせ一覧 <small>{news.length} 件</small>
              </h2>
              <div style={{ display: 'flex', gap: 6, marginBottom: 12 }}>
                <button className="btn btn-primary btn-sm" onClick={() => setEditingNewsId('new')}>＋ 新規追加</button>
                <button className="btn btn-ghost btn-sm" onClick={() => importJson('news')}>📂 JSインポート</button>
                <button className="btn btn-ghost btn-sm" onClick={() => resetToFile('news')}>↺ ファイルから再読込</button>
              </div>
              {news.length === 0 ? (
                <div className="empty-list">お知らせがありません</div>
              ) : news.map(n => (
                <div key={n.id} className={'entry ' + (editingNewsId === n.id ? 'selected' : '')}>
                  <div className="entry-main">
                    <div className="entry-meta">
                      <span className="entry-date">{n.date}</span>
                      <span className={'entry-tag tag-' + n.tag}>{n.tagLabel}</span>
                    </div>
                    <div className="entry-text">{n.text}</div>
                  </div>
                  <div className="entry-actions">
                    <button className="btn btn-ghost btn-sm" onClick={() => setEditingNewsId(n.id)}>編集</button>
                    <button className="btn btn-danger btn-sm" onClick={() => deleteNewsEntry(n.id)}>削除</button>
                  </div>
                </div>
              ))}
            </div>

            <div className="card">
              <h2>{editingNewsId ? (editingNewsId === 'new' ? '新規お知らせ' : 'お知らせを編集') : 'お知らせを選択'}</h2>
              {editingNews ? (
                <NewsForm
                  key={editingNewsId}
                  initial={editingNews}
                  onSave={saveNewsEntry}
                  onCancel={() => setEditingNewsId(null)}
                />
              ) : (
                <div className="empty-form">
                  <div className="empty-form-icon">📝</div>
                  左側から編集する項目を選ぶか、<br />「新規追加」を押してください。
                </div>
              )}
            </div>
          </div>
        )}

        {tab === 'posts' && (
          <div className="layout">
            <div className="card">
              <h2>
                ブログ記事一覧 <small>{posts.length} 件</small>
              </h2>
              <div style={{ display: 'flex', gap: 6, marginBottom: 12 }}>
                <button className="btn btn-primary btn-sm" onClick={() => setEditingPostSlug('new')}>＋ 新規記事</button>
                <button className="btn btn-ghost btn-sm" onClick={() => importJson('posts')}>📂 JSインポート</button>
                <button className="btn btn-ghost btn-sm" onClick={() => resetToFile('posts')}>↺ ファイルから再読込</button>
              </div>
              {posts.length === 0 ? (
                <div className="empty-list">記事がありません</div>
              ) : posts.map(p => (
                <div key={p.slug} className={'entry ' + (editingPostSlug === p.slug ? 'selected' : '')}>
                  <div className="entry-main">
                    <div className="entry-meta">
                      <span className="entry-date">{p.date}</span>
                      <span className="entry-tag tag-info">{p.label}</span>
                    </div>
                    <div className="entry-text" style={{ fontWeight: 700 }}>{p.title}</div>
                    <div className="entry-text" style={{ fontSize: 12, color: 'var(--muted)', marginTop: 4, WebkitLineClamp: 1 }}>{p.excerpt}</div>
                  </div>
                  <div className="entry-actions">
                    <a className="btn btn-ghost btn-sm" href={'post.html?slug=' + encodeURIComponent(p.slug)} target="_blank">👁</a>
                    <button className="btn btn-ghost btn-sm" onClick={() => setEditingPostSlug(p.slug)}>編集</button>
                    <button className="btn btn-danger btn-sm" onClick={() => deletePost(p.slug)}>削除</button>
                  </div>
                </div>
              ))}
            </div>

            <div className="card">
              <h2>{editingPostSlug ? (editingPostSlug === 'new' ? '新規ブログ記事' : '記事を編集') : '記事を選択'}</h2>
              {editingPost ? (
                <PostForm
                  key={editingPostSlug}
                  initial={editingPost}
                  onSave={savePostEntry}
                  onCancel={() => setEditingPostSlug(null)}
                />
              ) : (
                <div className="empty-form">
                  <div className="empty-form-icon">✍️</div>
                  左側から編集する記事を選ぶか、<br />「新規記事」を押してください。
                </div>
              )}
            </div>
          </div>
        )}
      </div>

      {toast && <div className={'toast ' + (toastErr ? 'error' : '')}>{toast}</div>}
    </>
  );
}

function NewsForm({ initial, onSave, onCancel }) {
  const [data, setData] = React.useState(initial);
  return (
    <>
      <div className="form-group">
        <label>日付 <span className="req">*</span></label>
        <input type="text" value={data.date} placeholder="2026.04.20" onChange={e => setData({ ...data, date: e.target.value })} />
        <div className="hint">形式：YYYY.MM.DD</div>
      </div>
      <div className="form-group">
        <label>カテゴリ <span className="req">*</span></label>
        <select value={data.tag} onChange={e => setData({ ...data, tag: e.target.value })}>
          {TAG_OPTIONS.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
        </select>
      </div>
      <div className="form-group">
        <label>本文 <span className="req">*</span></label>
        <input type="text" value={data.text} placeholder="ホームページを公開しました" onChange={e => setData({ ...data, text: e.target.value })} />
      </div>
      <div className="form-actions">
        <button className="btn btn-primary" onClick={() => onSave(data)}>💾 保存する</button>
        <button className="btn btn-ghost" onClick={onCancel}>キャンセル</button>
      </div>
    </>
  );
}

function PostForm({ initial, onSave, onCancel }) {
  const [data, setData] = React.useState(initial);
  return (
    <>
      <div className="form-group">
        <label>タイトル <span className="req">*</span></label>
        <input type="text" value={data.title} placeholder="記事のタイトル" onChange={e => setData({ ...data, title: e.target.value })} />
      </div>
      <div className="form-group">
        <label>URL（スラッグ）</label>
        <input type="text" value={data.slug} placeholder="自動生成されます（例：chatgpt-tips）" onChange={e => setData({ ...data, slug: e.target.value })} />
        <div className="hint">空欄ならタイトルから自動生成。半角英数とハイフン推奨。</div>
      </div>
      <div className="form-group">
        <label>カテゴリ</label>
        <select value={data.label} onChange={e => setData({ ...data, label: e.target.value })}>
          {LABEL_OPTIONS.map(l => <option key={l} value={l}>{l}</option>)}
        </select>
      </div>
      <div className="form-group">
        <label>日付</label>
        <input type="text" value={data.date} onChange={e => setData({ ...data, date: e.target.value })} />
      </div>
      <div className="form-group">
        <label>サムネイル画像</label>
        <select value={data.thumbnail} onChange={e => setData({ ...data, thumbnail: e.target.value })}>
          {THUMB_OPTIONS.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
        </select>
        <div className="hint">または直接URLを入力：</div>
        <input type="text" value={data.thumbnail} placeholder="assets/xxx.png または https://..." onChange={e => setData({ ...data, thumbnail: e.target.value })} style={{ marginTop: 6 }} />
      </div>
      <div className="form-group">
        <label>要約（一覧表示用）</label>
        <input type="text" value={data.excerpt} placeholder="記事の冒頭の紹介文" onChange={e => setData({ ...data, excerpt: e.target.value })} />
      </div>
      <div className="form-group">
        <label>本文 <span className="req">*</span></label>
        <textarea value={data.body} placeholder="## 見出し&#10;&#10;本文をここに...&#10;&#10;**強調**したい部分はアスタリスクで囲みます。&#10;&#10;- 箇条書きも可能&#10;- マークダウン記法対応" onChange={e => setData({ ...data, body: e.target.value })} style={{ minHeight: 320 }} />
        <div className="hint">マークダウン記法対応：<code>## 見出し2</code> / <code>### 見出し3</code> / <code>**太字**</code> / <code>- 箇条書き</code> / 空行で段落区切り</div>
      </div>
      <div className="form-actions">
        <button className="btn btn-primary" onClick={() => onSave(data)}>💾 保存する</button>
        <button className="btn btn-ghost" onClick={onCancel}>キャンセル</button>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
